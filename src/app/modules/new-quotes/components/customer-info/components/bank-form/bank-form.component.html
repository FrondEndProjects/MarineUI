<!-- ─── GOODS OTHER DETAILS SECTION ─── -->
<div class="section-header">
  <div class="section-icon"><i class="fas fa-info-circle"></i></div>
  <div>
    <div class="section-title">Goods Other Details</div>
  </div>
</div>

<div class="section-body">

  <!-- ─── BILL / AIRWAY PANEL ─── -->
  <div class="panel" [class.closed]="!showBillPanel">
    <div class="panel-header" (click)="showBillPanel = !showBillPanel">
      <div class="ph-title">
        <i class="fas fa-file-invoice"></i> Bill / Airway Details
      </div>
      <i class="pi ph-arrow" [class.pi-chevron-down]="showBillPanel" [class.pi-chevron-right]="!showBillPanel"></i>
    </div>
    <div class="panel-body" *ngIf="showBillPanel">
      <form [formGroup]="bankForm">
        <div class="row g-3">

          <!-- BL/AWB Number -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>BL | AWB | LR | RR Number</label>
              <input pInputText formControlName="blAwbLrRrNumber"
                placeholder="Enter number" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- BL/AWB Date -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>BL | AWB | LR | RR Date</label>
              <p-calendar formControlName="blAwbLrRrDate"
               dateFormat="dd/mm/yy"
                [showIcon]="true"
                placeholder="Select date" appendTo="body"
                styleClass="w-100"
                inputStyleClass="p-inputtext-sm w-100">
              </p-calendar>
            </div>
          </div>

          <!-- Sailing Date -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>Sailing Date</label>
              <p-calendar formControlName="sailingDate"
               dateFormat="dd/mm/yy"
                [showIcon]="true" appendTo="body"
                placeholder="Select date"
                styleClass="w-100"
                inputStyleClass="p-inputtext-sm w-100">
              </p-calendar>
            </div>
          </div>

          <!-- Invoice Number -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>Invoice Number</label>
              <input pInputText formControlName="invoiceNumber"
                [patterns]="pattern" [dropSpecialCharacters]="false"
                mask="000000000000000000"
                placeholder="Enter invoice number" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- Invoice Date -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>Invoice Date</label>
              <p-calendar formControlName="invoiceDate"
               dateFormat="dd/mm/yy" appendTo="body"
                [showIcon]="true"
                placeholder="Select date"
                styleClass="w-100"
                inputStyleClass="p-inputtext-sm w-100">
              </p-calendar>
            </div>
          </div>

          <!-- PO/PI Number -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>PO/PI Number</label>
              <input pInputText formControlName="poPiNumber"
                placeholder="Enter PO/PI number" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- Consigned To -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>Consigned To</label>
              <input pInputText formControlName="consignedTo"
                placeholder="Enter consignee" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- Consigned From -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>Consigned From</label>
              <input pInputText formControlName="consignedForm"
                placeholder="Enter consignor" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- UCR Number -->
          <!-- <div class="col-12 col-md-4" *ngIf="userDetails?.RegionCode=='100020'">
            <div class="pf">
              <label>UCR Number</label>
              <input pInputText formControlName="UCRNumber"
                placeholder="Enter UCR number" class="w-100 p-inputtext-sm" />
            </div>
          </div> -->

        </div>
      </form>
    </div>
  </div>

  <!-- ─── BANK DETAILS PANEL ─── -->
  <div class="panel" [class.closed]="!showBankPanel">
    <div class="panel-header" (click)="showBankPanel = !showBankPanel">
      <div class="ph-title">
        <i class="fas fa-university"></i> Bank Details
      </div>
      <i class="pi ph-arrow" [class.pi-chevron-down]="showBankPanel" [class.pi-chevron-right]="!showBankPanel"></i>
    </div>
    <div class="panel-body" *ngIf="showBankPanel">
      <form [formGroup]="bankForm">
        <div class="row g-3">

          <!-- LC Bank -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>LC Bank</label>
              <p-dropdown 
                [options]="dropBankList"
                optionLabel="CodeDescription"
                optionValue="Code" appendTo="body"
                formControlName="lCBank"
                placeholder="Select Bank"
                [filter]="true"
                filterPlaceholder="Search bank..."
                styleClass="w-100">
              </p-dropdown>
            </div>
          </div>

          <!-- LC Number -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>LC Number</label>
              <input pInputText formControlName="lcNumber"
                placeholder="Enter LC number" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- LC Bank Description -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>LC Bank Description</label>
              <input pInputText formControlName="lcBankDesc"
                placeholder="Enter bank description" class="w-100 p-inputtext-sm" />
            </div>
          </div>

          <!-- LC Date -->
          <div class="col-12 col-md-4">
            <div class="pf">
              <label>LC Date</label>
              <p-calendar formControlName="lcDate"
                dateFormat="dd/mm/yy"
                [showIcon]="true" appendTo="body"
                placeholder="Select date"
                styleClass="w-100"
                inputStyleClass="p-inputtext-sm w-100">
              </p-calendar>
            </div>
          </div>

        </div>
      </form>
    </div>
  </div>

</div>
