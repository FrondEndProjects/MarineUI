<div class="sel-toolbar">
  <div class="sel-search-wrap">
    <i class="pi pi-search"></i>
    <input pInputText type="text" [(ngModel)]="filterValue" placeholder="Search commodities..." />
  </div>
  <div class="sel-badge" *ngIf="totalSelected != null && totalSelected != 0">
    <i class="pi pi-box"></i>
    Commodity Selected — {{ totalSelected }}
  </div>
</div>

<app-material-table
  [cols]="columnHeader"
  [data]="tableData"
  [filterValue]="filterValue"
  (onSelectCustomer)="onSelectCustomer($event)">
</app-material-table>

<div class="sel-submit-row">
  <button pButton type="button" label="Submit" icon="pi pi-check"
    class="p-button-rounded p-button-sm" (click)="onSubmit()"></button>
</div>
