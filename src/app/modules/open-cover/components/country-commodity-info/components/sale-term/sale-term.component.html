<ng-container *ngIf="showSection">
  <div class="sel-toolbar">
    <div class="sel-search-wrap">
      <i class="pi pi-search"></i>
      <input pInputText type="text" [(ngModel)]="filterValue" placeholder="Search sale terms..." />
    </div>
    <div class="sel-badge" *ngIf="totalSelected != null && totalSelected != 0">
      <i class="pi pi-sliders-h"></i>
      Tolerance Selected — {{ totalSelected }}
    </div>
  </div>

  <app-material-table
    [cols]="columnHeader"
    [data]="tableData"
    [filterValue]="filterValue"
    (onSelectCustomer)="onSelectCustomer($event)">
  </app-material-table>
</ng-container>

<div class="sel-submit-row">
  <button pButton type="button" label="Submit" icon="pi pi-check"
    class="p-button-rounded p-button-sm" (click)="onSaveSaleterm()"></button>
</div>
