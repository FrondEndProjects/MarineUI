<div class="vision-card">
  <div class="vision-card-header">
    Commodity Rate Info
  </div>
  <div class="vision-card-body">
    <div class="row" style="overflow: auto;">
      <div class="col-md-12 col-lg-12 col-xl-12">
        <ng-container>
          <app-commodity-table [cols]="columnHeader" [data]="tableData" [innerCols]="innerColumnHeader"
            [innerData]="innerTableData" (onAdd)="onGetSelectedCommodityList($event)">
          </app-commodity-table>
        </ng-container>
      </div>
    </div>
  </div>
</div>
<app-commodity-clauses-table></app-commodity-clauses-table>
<ng-container *ngIf="coverTransitId =='V'">
  <app-land-trasit></app-land-trasit>
</ng-container>
<ng-container *ngIf="isWarType == 'Y'">
  <app-war></app-war>
</ng-container>
<ng-container *ngIf="EndorsementStatus == 'Y'">
  <app-endorsement-admin></app-endorsement-admin>
</ng-container>
<app-share-percentage></app-share-percentage>

<div class="sa-page-footer">

</div>
