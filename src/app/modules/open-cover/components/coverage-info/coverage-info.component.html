<div class="cov-page">

  <!-- ── sa-card: Coverage Information ── -->
  <div class="sa-card">

    <!-- Card Header -->
    <div class="sa-card-header">
      <i class="fas fa-shield-alt sa-icon"></i>
      <span class="sa-title">Coverage Information</span>
    </div>

    <!-- Card Body -->
    <div class="sa-card-body">

      <!-- Toolbar: search -->
      <div class="cov-toolbar">
        <div class="cov-search-wrap">
          <i class="pi pi-search cov-search-icon"></i>
          <input
            pInputText
            type="text"
            [(ngModel)]="filterValue"
            placeholder="Search coverage..."
            class="cov-search-input"
          />
        </div>
      </div>

      <!-- Trans-cover table -->
      <app-trans-cover-table
        [cols]="columnHeader"
        [data]="tableData"
        [currencyList]="currencyList"
        [filterValue]="filterValue"
        (onSelectCustomer)="onSelectCustomer($event)">
      </app-trans-cover-table>

    </div>
  </div>

  <!-- ── Page Footer ── -->
  <div class="sa-page-footer">
    <button
      pButton
      type="button"
      label="Back"
      icon="pi pi-arrow-left"
      class="p-button-danger p-button-rounded p-button-sm"
      (click)="onMoveBack()">
    </button>
    <button
      pButton
      type="button"
      label="Next"
      icon="pi pi-arrow-right"
      iconPos="right"
      class="p-button-rounded p-button-sm"
      (click)="onSubmit()">
    </button>
  </div>

</div>
